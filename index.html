<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <h1 class="text-5xl font-bold text-center text-gray-800 m-12">Anime</h1>
    
    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-12">Meilleurs animes</h1>
        <div id="top-anime-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 justify-items-center">

        </div>

    </div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-12">Anime aléatoires</h1>
        <button id="random-anime-button" class="mb-8 block mx-auto bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition-colors duration-300">Générer un anime aléatoire</button>
        <div id="random-anime-container" class="justify-items-center">

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
